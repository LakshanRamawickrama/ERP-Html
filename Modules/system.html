<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Access - Add Credential</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f8fafc;
      padding: 0;
      margin: 0;
    }
    .form-header {
      background: linear-gradient(135deg, #b91c1c, #f87171);
      color: white;
      padding: 25px 30px;
      text-align: center;
    }
    .form-header h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }
    .form-header p {
      opacity: 0.9;
      font-size: 15px;
    }
    .form-body {
      padding: 30px;
      background: #f8fafc;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
    }
    label {
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }
    input, select, textarea {
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 15px;
      background: white;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #b91c1c;
      box-shadow: 0 0 0 3px rgba(185, 28, 28, 0.15);
    }
    .full-width {
      grid-column: 1 / -1;
    }
    .btn {
      margin-top: 30px;
      padding: 14px 28px;
      background: linear-gradient(135deg, #b91c1c, #f87171);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s;
    }
    .btn:hover {
      background: linear-gradient(135deg, #991b1b, #dc2626);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(185, 28, 28, 0.4);
    }
  </style>
</head>
<body>

  <div class="form-header">
    <h1>🔐 System Access</h1>
    <p>Add Till, PayPoint, PayZone & Service Credentials</p>
  </div>

  <div class="form-body">
    <form id="systemForm">
      <div class="form-grid">

        <!-- Service Information -->
        <div class="form-group">
          <label>Service Name *</label>
          <select id="serviceName" required>
            <option value="">Select Service</option>
            <option value="Till Access">Till Access</option>
            <option value="PayPoint">PayPoint</option>
            <option value="PayZone">PayZone</option>
            <option value="Lottery">Lottery</option>
            <option value="Parcel Service">Parcel Services</option>
            <option value="Company House">Company House</option>
            <option value="Card Processing">Card Processing (Dojo)</option>
            <option value="Electric">Electric Bill Portal</option>
            <option value="Gas">Gas Bill Portal</option>
            <option value="Water">Water Bill Portal</option>
            <option value="Other">Other Service</option>
          </select>
        </div>

        <div class="form-group">
          <label>Account Number / Username *</label>
          <input type="text" id="accountNumber" placeholder="e.g. PP-987654 or Till Login ID" required>
        </div>

        <!-- Contact / Access Details -->
        <div class="form-group">
          <label>Telephone Number</label>
          <input type="tel" id="telNo" placeholder="e.g. +94 11 234 5678">
        </div>

        <div class="form-group">
          <label>Access Level</label>
          <select id="accessLevel">
            <option value="">Select Access Level</option>
            <option value="Admin">Admin</option>
            <option value="Full Access">Full Access</option>
            <option value="View Only">View Only</option>
            <option value="Operator">Operator</option>
            <option value="Manager">Manager</option>
            <option value="Limited">Limited Access</option>
          </select>
        </div>

        <!-- Status -->
        <div class="form-group">
          <label>Status *</label>
          <select id="status" required>
            <option value="">Select Status</option>
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
            <option value="Suspended">Suspended</option>
            <option value="Expired">Expired</option>
            <option value="Pending Renewal">Pending Renewal</option>
          </select>
        </div>

        <!-- Password / Credential Note (Optional) -->
        <div class="form-group full-width">
          <label>Password / PIN (Optional - Encrypted)</label>
          <input type="password" id="password" placeholder="Enter access password or PIN">
        </div>

        <!-- Notes -->
        <div class="form-group full-width">
          <label>Notes / Important Details</label>
          <textarea id="notes" rows="4" placeholder="Login URL, renewal date, contact person, special instructions, backup codes, etc."></textarea>
        </div>

      </div>

      <button type="submit" class="btn">Save System Access</button>
    </form>
  </div>

  <script>
    document.getElementById('systemForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      // Collect form data
      const fullAccount = document.getElementById('accountNumber').value;
      const newRecord = {
        service: document.getElementById('serviceName').value,
        fullAccount: fullAccount,
        account: '****' + fullAccount.slice(-4),
        tel: document.getElementById('telNo').value,
        level: document.getElementById('accessLevel').value,
        status: document.getElementById('status').value,
        notes: document.getElementById('notes').value,
        revealed: false
      };
      
      // Save to localStorage
      try {
        const data = JSON.parse(localStorage.getItem('clearerp_data')) || { access: [] };
        if (!data.access) data.access = [];
        data.access.push(newRecord);
        localStorage.setItem('clearerp_data', JSON.stringify(data));
        
        // Notify parent window (works for both drawer iframe and new tab)
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'dataUpdated', module: 'access' }, '*');
        } else if (window.opener && !window.opener.closed) {
          window.opener.postMessage({ type: 'dataUpdated', module: 'access' }, '*');
        }
        
        this.reset();
      } catch (error) {
        alert('❌ Error saving data: ' + error.message);
      }
    });
  </script>

</body>
</html>
