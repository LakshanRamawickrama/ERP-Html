<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fleet Management - Add Vehicle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f8fafc;
      padding: 0;
      margin: 0;
    }
    .form-header {
      background: linear-gradient(135deg, #15803d, #4ade80);
      color: white;
      padding: 25px 30px;
      text-align: center;
    }
    .form-header h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }
    .form-header p {
      opacity: 0.9;
      font-size: 15px;
    }
    .form-body {
      padding: 30px;
      background: #f8fafc;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
    }
    label {
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }
    input, select, textarea {
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 15px;
      background: white;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #16a34a;
      box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.15);
    }
    .full-width {
      grid-column: 1 / -1;
    }
    .btn {
      margin-top: 30px;
      padding: 14px 28px;
      background: linear-gradient(135deg, #15803d, #4ade80);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s;
    }
    .btn:hover {
      background: linear-gradient(135deg, #166534, #22c55e);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(21, 128, 61, 0.4);
    }
  </style>
</head>
<body>

  <div class="form-header">
    <h1>🚚 Logistics / Fleet Management</h1>
    <p>Add New Vehicle or Delivery Entry</p>
  </div>

  <div class="form-body">
    <form id="fleetForm">
      <div class="form-grid">

        <!-- Basic Vehicle Info -->
        <div class="form-group">
          <label>Vehicle Name *</label>
          <input type="text" id="vehicleName" placeholder="e.g. CAR 1 (Delivery Van)" required>
        </div>

        <div class="form-group">
          <label>Vehicle Number / Plate *</label>
          <input type="text" id="vehicleNumber" placeholder="e.g. ABC-1234 or WP-ABC-5678" required>
        </div>

        <!-- Key Dates -->
        <div class="form-group">
          <label>Insurance Expiry Date</label>
          <input type="date" id="insuranceExpiry">
        </div>

        <div class="form-group">
          <label>MOT Expiry Date</label>
          <input type="date" id="motDate">
        </div>

        <div class="form-group">
          <label>Road Tax Expiry Date</label>
          <input type="date" id="roadTaxDate">
        </div>

        <div class="form-group">
          <label>Next Delivery Date (if applicable)</label>
          <input type="date" id="deliveryDate">
        </div>

        <!-- Status -->
        <div class="form-group">
          <label>Status *</label>
          <select id="status" required>
            <option value="">Select Status</option>
            <option value="Active">Active</option>
            <option value="In Service">In Service / Maintenance</option>
            <option value="Inactive">Inactive</option>
            <option value="Sold">Sold / Disposed</option>
          </select>
        </div>

        <!-- Notes -->
        <div class="form-group full-width">
          <label>Notes / Remarks</label>
          <textarea id="notes" rows="4" placeholder="Additional information such as mileage, maintenance history, driver assigned, parcel service details, etc."></textarea>
        </div>

        <!-- Parcel / Delivery Service -->
        <div class="form-group full-width">
          <label>Parcel / Delivery Services</label>
          <input type="text" id="parcelService" placeholder="e.g. DHL, Uber Eats, Own Delivery, ParcelForce">
        </div>

      </div>

      <button type="submit" class="btn">Save Vehicle / Fleet Entry</button>
    </form>
  </div>

  <script>
    document.getElementById('fleetForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      // Collect form data
      const newRecord = {
        vehicle: document.getElementById('vehicleName').value,
        reg: document.getElementById('vehicleNumber').value,
        insurance: document.getElementById('insuranceExpiry').value,
        mot: document.getElementById('motDate').value,
        roadTax: document.getElementById('roadTaxDate').value,
        status: document.getElementById('status').value,
        notes: document.getElementById('notes').value
      };
      
      // Save to localStorage
      try {
        const data = JSON.parse(localStorage.getItem('clearerp_data')) || { fleet: [] };
        if (!data.fleet) data.fleet = [];
        data.fleet.push(newRecord);
        localStorage.setItem('clearerp_data', JSON.stringify(data));
        
        // Notify parent window (works for both drawer iframe and new tab)
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'dataUpdated', module: 'fleet' }, '*');
        } else if (window.opener && !window.opener.closed) {
          window.opener.postMessage({ type: 'dataUpdated', module: 'fleet' }, '*');
        }
        
        this.reset();
      } catch (error) {
        alert('❌ Error saving data: ' + error.message);
      }
    });
  </script>

</body>
</html>
