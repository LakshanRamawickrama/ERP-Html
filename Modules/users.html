<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Management - Add User</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f8fafc;
      padding: 0;
      margin: 0;
    }
    .form-header {
      background: linear-gradient(135deg, #dc2626, #ef4444);
      color: white;
      padding: 25px 30px;
      text-align: center;
    }
    .form-header h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }
    .form-header p {
      opacity: 0.9;
      font-size: 15px;
    }
    .form-body {
      padding: 30px;
      background: #f8fafc;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
    }
    label {
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }
    input, select, textarea {
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 15px;
      background: white;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #dc2626;
      box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.15);
    }
    .full-width {
      grid-column: 1 / -1;
    }
    .btn {
      margin-top: 30px;
      padding: 14px 28px;
      background: linear-gradient(135deg, #dc2626, #ef4444);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s;
    }
    .btn:hover {
      background: linear-gradient(135deg, #b91c1c, #dc2626);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(220, 38, 38, 0.4);
    }
    .note {
      font-size: 13px;
      color: #64748b;
      text-align: center;
      margin-top: 20px;
      padding: 12px;
      background: #fef2f2;
      border-radius: 8px;
      border: 1px solid #fecaca;
    }
    .password-hint {
      font-size: 12px;
      color: #6b7280;
      margin-top: 5px;
    }
  </style>
</head>
<body>

  <div class="form-header">
    <h1>🔒 User Management</h1>
    <p>Add New User Account</p>
  </div>

  <div class="form-body">
    <form id="userForm">
      <div class="form-grid">

        <!-- Basic Information -->
        <div class="form-group">
          <label>Username *</label>
          <input type="text" id="username" placeholder="e.g. john.doe" required minlength="3">
          <small class="password-hint">Minimum 3 characters, no spaces</small>
        </div>

        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="fullName" placeholder="e.g. John Doe" required>
        </div>

        <!-- Contact Information -->
        <div class="form-group">
          <label>Email Address *</label>
          <input type="email" id="email" placeholder="e.g. john@example.com" required>
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="phone" placeholder="e.g. +44 20 1234 5678">
        </div>

        <!-- Password -->
        <div class="form-group">
          <label>Password *</label>
          <input type="password" id="password" placeholder="Enter password" required minlength="6">
          <small class="password-hint">Minimum 6 characters</small>
        </div>

        <div class="form-group">
          <label>Confirm Password *</label>
          <input type="password" id="confirmPassword" placeholder="Re-enter password" required minlength="6">
        </div>

        <!-- Role & Permissions -->
        <div class="form-group">
          <label>User Role *</label>
          <select id="role" required>
            <option value="">Select Role</option>
            <option value="Super Admin">Super Admin (Full Access)</option>
            <option value="Admin">Admin (Most Access)</option>
            <option value="Manager">Manager (Limited Access)</option>
            <option value="Staff">Staff (View Only)</option>
          </select>
        </div>

        <div class="form-group">
          <label>Department</label>
          <select id="department">
            <option value="">Select Department</option>
            <option value="Management">Management</option>
            <option value="Finance">Finance</option>
            <option value="Operations">Operations</option>
            <option value="HR">Human Resources</option>
            <option value="IT">IT / Technical</option>
            <option value="Sales">Sales</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <!-- Status -->
        <div class="form-group">
          <label>Account Status *</label>
          <select id="status" required>
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
            <option value="Suspended">Suspended</option>
          </select>
        </div>

        <!-- Additional Info -->
        <div class="form-group full-width">
          <label>Notes / Remarks</label>
          <textarea id="notes" rows="3" placeholder="Additional information about this user, access restrictions, special permissions, etc."></textarea>
        </div>

      </div>

      <button type="submit" class="btn">Create User Account</button>
      
      <div class="note">
        ⚠️ <strong>Security Note:</strong> User will receive login credentials. Ensure password is secure and shared safely.
      </div>
    </form>
  </div>

  <script>
    document.getElementById('userForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      // Validate passwords match
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      if (password !== confirmPassword) {
        alert('❌ Passwords do not match! Please try again.');
        return;
      }
      
      // Validate username format
      const username = document.getElementById('username').value;
      if (username.includes(' ')) {
        alert('❌ Username cannot contain spaces!');
        return;
      }
      
      // Collect form data
      const newRecord = {
        username: username,
        fullName: document.getElementById('fullName').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        role: document.getElementById('role').value,
        department: document.getElementById('department').value,
        status: document.getElementById('status').value,
        notes: document.getElementById('notes').value,
        createdDate: new Date().toISOString().split('T')[0]
      };
      
      // Save to localStorage
      try {
        const data = JSON.parse(localStorage.getItem('clearerp_data')) || { users: [] };
        if (!data.users) data.users = [];
        
        // Check if username already exists
        const existingUser = data.users.find(u => u.username === username);
        if (existingUser) {
          alert('❌ Username already exists! Please choose a different username.');
          return;
        }
        
        data.users.push(newRecord);
        localStorage.setItem('clearerp_data', JSON.stringify(data));
        
        // Notify parent window (works for both drawer iframe and new tab)
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'dataUpdated', module: 'users' }, '*');
        } else if (window.opener && !window.opener.closed) {
          window.opener.postMessage({ type: 'dataUpdated', module: 'users' }, '*');
        }
        
        this.reset();
      } catch (error) {
        alert('❌ Error saving data: ' + error.message);
      }
    });
  </script>

</body>
</html>
