<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR Management - Add Staff Shift</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f8fafc;
      padding: 0;
      margin: 0;
    }
    .form-header {
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      color: white;
      padding: 25px 30px;
      text-align: center;
    }
    .form-header h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }
    .form-header p {
      opacity: 0.9;
      font-size: 15px;
    }
    .form-body {
      padding: 30px;
      background: #f8fafc;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
    }
    label {
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }
    input, select, textarea {
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 15px;
      background: white;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
    }
    .full-width {
      grid-column: 1 / -1;
    }
    .btn {
      margin-top: 30px;
      padding: 14px 28px;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s;
    }
    .btn:hover {
      background: linear-gradient(135deg, #6d28d9, #9333ea);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4);
    }
  </style>
</head>
<body>

  <div class="form-header">
    <h1>👥 HR Management</h1>
    <p>Add Staff Shift / Schedule</p>
  </div>

  <div class="form-body">
    <form id="hrForm">
      <div class="form-grid">

        <!-- Staff Information -->
        <div class="form-group">
          <label>Staff Name *</label>
          <input type="text" id="staffName" placeholder="e.g. Kasun Perera" required>
        </div>

        <div class="form-group">
          <label>Role *</label>
          <select id="role" required>
            <option value="">Select Role</option>
            <option value="Tele Agent">Tele Agent</option>
            <option value="Team Leader">Team Leader</option>
            <option value="Manager">Manager</option>
            <option value="Cashier">Cashier</option>
            <option value="Delivery Staff">Delivery Staff</option>
            <option value="Cleaner">Cleaner</option>
            <option value="Supervisor">Supervisor</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <!-- Shift Details -->
        <div class="form-group">
          <label>Shift Date *</label>
          <input type="date" id="shiftDate" required>
        </div>

        <div class="form-group">
          <label>Start Time *</label>
          <input type="time" id="startTime" required>
        </div>

        <div class="form-group">
          <label>End Time *</label>
          <input type="time" id="endTime" required>
        </div>

        <!-- Status -->
        <div class="form-group">
          <label>Status *</label>
          <select id="status" required>
            <option value="">Select Status</option>
            <option value="Scheduled">Scheduled</option>
            <option value="In Progress">In Progress</option>
            <option value="Completed">Completed</option>
            <option value="Absent">Absent</option>
            <option value="Cancelled">Cancelled</option>
            <option value="On Leave">On Leave</option>
          </select>
        </div>

        <!-- Notes -->
        <div class="form-group full-width">
          <label>Notes / Remarks</label>
          <textarea id="notes" rows="4" placeholder="Shift details, special instructions, break time, handover notes, performance remarks, etc."></textarea>
        </div>

      </div>

      <button type="submit" class="btn">Save Staff Shift</button>
    </form>
  </div>

  <script>
    document.getElementById('hrForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      // Collect form data
      const newRecord = {
        name: document.getElementById('staffName').value,
        role: document.getElementById('role').value,
        shiftDate: document.getElementById('shiftDate').value,
        startTime: document.getElementById('startTime').value,
        endTime: document.getElementById('endTime').value,
        status: document.getElementById('status').value,
        notes: document.getElementById('notes').value
      };
      
      // Save to localStorage
      try {
        const data = JSON.parse(localStorage.getItem('clearerp_data')) || { hr: [] };
        if (!data.hr) data.hr = [];
        data.hr.push(newRecord);
        localStorage.setItem('clearerp_data', JSON.stringify(data));
        
        // Notify parent window (works for both drawer iframe and new tab)
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'dataUpdated', module: 'hr' }, '*');
        } else if (window.opener && !window.opener.closed) {
          window.opener.postMessage({ type: 'dataUpdated', module: 'hr' }, '*');
        }
        
        this.reset();
      } catch (error) {
        alert('❌ Error saving data: ' + error.message);
      }
    });
  </script>

</body>
</html>
